    <title>Jotadablio 3DWorld</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a; /* slate-900 */
        color: #f8fafc;
      }

      .font-tech {
        font-family: 'Orbitron', sans-serif;
      }

      /* Custom animations for the printer */
      @keyframes scan-x {
        0%, 100% { transform: translateX(-20%); }
        50% { transform: translateX(20%); }
      }
      
      @keyframes scan-y {
        0%, 100% { transform: translateY(-10%); }
        50% { transform: translateY(10%); }
      }

      @keyframes build-up {
        0% { clip-path: inset(100% 0 0 0); opacity: 0.5; }
        100% { clip-path: inset(0 0 0 0); opacity: 1; }
      }

      .animate-scan-x {
        animation: scan-x 2s ease-in-out infinite;
      }

      .animate-build {
        animation: build-up 2.5s linear forwards;
      }
    </style>
